<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>咨询求职小助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #2563eb; color: white; padding: 16px 24px; text-align: center; font-size: 18px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .chat-container { flex: 1; overflow-y: auto; padding: 20px; max-width: 800px; width: 100%; margin: 0 auto; }
    .message { margin-bottom: 16px; display: flex; align-items: flex-start; animation: fadeIn 0.3s ease; }
    .message.user { flex-direction: row-reverse; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: white; }
    .message.ai .avatar { background: #2563eb; margin-right: 12px; }
    .message.user .avatar { background: #10b981; margin-left: 12px; }
    .bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-break: break-word; }
    .message.ai .bubble { background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .message.user .bubble { background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .loading { color: #999; font-size: 13px; padding: 8px 0; }
    .input-area { background: white; border-top: 1px solid #e5e7eb; padding: 16px 24px; }
    .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; gap: 12px; }
    input { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 24px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #2563eb; }
    button { padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 24px; font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
    button:hover { background: #1d4ed8; transform: translateY(-1px); }
    button:disabled { background: #93c5fd; cursor: not-allowed; transform: none; }
    .welcome { text-align: center; color: #999; margin: 40px 0; font-size: 14px; }
    .source-tag { font-size: 11px; color: #94a3b8; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="header">咨询求职小助手 · 基于 50+ 位真实从业者分享</div>
  <div class="chat-container" id="chatContainer">
    <div class="welcome">👋 你好！我是你的咨询行业求职顾问。你可以问我关于进入门槛、成长路径、工作体验、行业现状或薪资性价比的问题。</div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="userInput" placeholder="输入你的问题，例如：咨询行业现在还值得进吗？" onkeypress="if(event.key==='Enter')sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(content, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'ai'}`;
      div.innerHTML = `<div class="avatar">${isUser ? '我' : '咨'}</div><div class="bubble">${content}</div>`;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addLoading() {
      const div = document.createElement('div');
      div.className = 'message ai';
      div.id = 'loadingMsg';
      div.innerHTML = `<div class="avatar">咨</div><div class="bubble loading">正在查阅知识库...</div>`;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeLoading() {
      const loading = document.getElementById('loadingMsg');
      if (loading) loading.remove();
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      addMessage(text, true);
      userInput.value = '';
      sendBtn.disabled = true;
      addLoading();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await response.json();
        removeLoading();
        if (data.reply) {
          addMessage(data.reply, false);
        } else {
          addMessage('抱歉，获取回答失败，请稍后重试。', false);
        }
      } catch (error) {
        removeLoading();
        addMessage('网络错误，请检查连接后重试。', false);
      }
      sendBtn.disabled = false;
      userInput.focus();
    }
  </script>
</body>
</html>
